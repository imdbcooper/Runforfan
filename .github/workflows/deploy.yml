name: Deploy Runforfan

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/runforfan-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/runforfan-frontend

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    outputs:
      backend_digest: ${{ steps.backend.outputs.digest }}
      frontend_digest: ${{ steps.frontend.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push backend image
        id: backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        id: frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=/api
            VITE_ENABLE_DEV_LOGIN=false
            VITE_TELEGRAM_BOT_USERNAME=${{ vars.VITE_TELEGRAM_BOT_USERNAME || '' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: /opt/runforfan
      RUNFORFAN_DOMAIN: ${{ vars.RUNFORFAN_DOMAIN || 'run.slavx.ru' }}
      RUNFORFAN_APP_ENV: production
      RUNFORFAN_DEMO_SEED: false
      RUNFORFAN_FRONTEND_PORT: ${{ vars.RUNFORFAN_FRONTEND_PORT || '18080' }}
      RUNFORFAN_BACKEND_PORT: ${{ vars.RUNFORFAN_BACKEND_PORT || '18081' }}
      RUNFORFAN_FRONTEND_URL: ${{ vars.RUNFORFAN_FRONTEND_URL || 'https://run.slavx.ru/app/' }}
      RUNFORFAN_TELEGRAM_BOT_PROXY_URL: ${{ vars.RUNFORFAN_TELEGRAM_BOT_PROXY_URL || 'http://31.57.118.44:3128' }}
      RUNFORFAN_TELEGRAM_POLLING_ENABLED: ${{ vars.RUNFORFAN_TELEGRAM_POLLING_ENABLED || 'true' }}
      RUNFORFAN_LLM_TIMEOUT: ${{ vars.RUNFORFAN_LLM_TIMEOUT || '120' }}
      RUNFORFAN_COACH_ENABLED: ${{ vars.RUNFORFAN_COACH_ENABLED || 'false' }}
      RUNFORFAN_COACH_DELIVERY_ENABLED: ${{ vars.RUNFORFAN_COACH_DELIVERY_ENABLED || 'false' }}
      RUNFORFAN_COACH_DELIVERY_WORKER_ENABLED: ${{ vars.RUNFORFAN_COACH_DELIVERY_WORKER_ENABLED || 'false' }}
      RUNFORFAN_COACH_POST_WORKOUT_DELIVERY_ENABLED: ${{ vars.RUNFORFAN_COACH_POST_WORKOUT_DELIVERY_ENABLED || 'false' }}
      RUNFORFAN_COACH_WEEKLY_REVIEW_DELIVERY_ENABLED: ${{ vars.RUNFORFAN_COACH_WEEKLY_REVIEW_DELIVERY_ENABLED || 'false' }}
      RUNFORFAN_SAFETY_ESCALATION_ENABLED: ${{ vars.RUNFORFAN_SAFETY_ESCALATION_ENABLED || 'false' }}
      RUNFORFAN_POSTGRES_PASSWORD: ${{ secrets.RUNFORFAN_POSTGRES_PASSWORD }}
      RUNFORFAN_SECRET_KEY: ${{ secrets.RUNFORFAN_SECRET_KEY }}
      RUNFORFAN_TELEGRAM_BOT_TOKEN: ${{ secrets.RUNFORFAN_TELEGRAM_BOT_TOKEN }}
      RUNFORFAN_TELEGRAM_WEBHOOK_SECRET: ${{ secrets.RUNFORFAN_TELEGRAM_WEBHOOK_SECRET }}
    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST" || { echo "DEPLOY_HOST secret is required"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "DEPLOY_USER secret is required"; exit 1; }
          test -n "$RUNFORFAN_POSTGRES_PASSWORD" || { echo "RUNFORFAN_POSTGRES_PASSWORD secret is required"; exit 1; }
          test -n "$RUNFORFAN_SECRET_KEY" || { echo "RUNFORFAN_SECRET_KEY secret is required"; exit 1; }
          test -n "$RUNFORFAN_TELEGRAM_BOT_TOKEN" || { echo "RUNFORFAN_TELEGRAM_BOT_TOKEN secret is required"; exit 1; }
          test -n "$RUNFORFAN_TELEGRAM_WEBHOOK_SECRET" || { echo "RUNFORFAN_TELEGRAM_WEBHOOK_SECRET secret is required"; exit 1; }

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose files
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "sudo mkdir -p '$DEPLOY_PATH' && sudo chown '$DEPLOY_USER:$DEPLOY_USER' '$DEPLOY_PATH'"
          scp deploy/docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"
          scp deploy/Caddyfile "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/Caddyfile"

      - name: Write server environment
        run: |
          umask 077
          cat > runforfan.env <<EOF
          RUNFORFAN_DOMAIN=$RUNFORFAN_DOMAIN
          RUNFORFAN_BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}@${{ needs.build.outputs.backend_digest }}
          RUNFORFAN_FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}@${{ needs.build.outputs.frontend_digest }}
          RUNFORFAN_BACKEND_PORT=$RUNFORFAN_BACKEND_PORT
          RUNFORFAN_FRONTEND_PORT=$RUNFORFAN_FRONTEND_PORT
          RUNFORFAN_POSTGRES_PASSWORD=$RUNFORFAN_POSTGRES_PASSWORD
          RUNFORFAN_SECRET_KEY=$RUNFORFAN_SECRET_KEY
          RUNFORFAN_TELEGRAM_BOT_TOKEN=$RUNFORFAN_TELEGRAM_BOT_TOKEN
          RUNFORFAN_TELEGRAM_WEBHOOK_SECRET=$RUNFORFAN_TELEGRAM_WEBHOOK_SECRET
          RUNFORFAN_TELEGRAM_BOT_PROXY_URL=$RUNFORFAN_TELEGRAM_BOT_PROXY_URL
          RUNFORFAN_TELEGRAM_POLLING_ENABLED=$RUNFORFAN_TELEGRAM_POLLING_ENABLED
          RUNFORFAN_LLM_TIMEOUT=$RUNFORFAN_LLM_TIMEOUT
          RUNFORFAN_COACH_ENABLED=$RUNFORFAN_COACH_ENABLED
          RUNFORFAN_COACH_DELIVERY_ENABLED=$RUNFORFAN_COACH_DELIVERY_ENABLED
          RUNFORFAN_COACH_DELIVERY_WORKER_ENABLED=$RUNFORFAN_COACH_DELIVERY_WORKER_ENABLED
          RUNFORFAN_COACH_POST_WORKOUT_DELIVERY_ENABLED=$RUNFORFAN_COACH_POST_WORKOUT_DELIVERY_ENABLED
          RUNFORFAN_COACH_WEEKLY_REVIEW_DELIVERY_ENABLED=$RUNFORFAN_COACH_WEEKLY_REVIEW_DELIVERY_ENABLED
          RUNFORFAN_SAFETY_ESCALATION_ENABLED=$RUNFORFAN_SAFETY_ESCALATION_ENABLED
          RUNFORFAN_COACH_DELIVERY_POLL_SECONDS=30
          RUNFORFAN_COACH_DELIVERY_BATCH_SIZE=25
          RUNFORFAN_COACH_DELIVERY_MAX_ATTEMPTS=5
          RUNFORFAN_COACH_DELIVERY_RETRY_BASE_SECONDS=60
          RUNFORFAN_FRONTEND_URL=$RUNFORFAN_FRONTEND_URL
          RUNFORFAN_TELEGRAM_LOGIN_CODE_TTL_SECONDS=300
          RUNFORFAN_APP_ENV=$RUNFORFAN_APP_ENV
          RUNFORFAN_DEMO_SEED=$RUNFORFAN_DEMO_SEED
          RUNFORFAN_AUTO_CREATE_SCHEMA=true
          EOF
          scp runforfan.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"
          rm -f runforfan.env

      - name: Install host Caddy config
        run: |
          cat > caddy-runforfan.conf <<EOF
          [Service]
          Environment=RUNFORFAN_DOMAIN=$RUNFORFAN_DOMAIN
          Environment=RUNFORFAN_BACKEND_PORT=$RUNFORFAN_BACKEND_PORT
          Environment=RUNFORFAN_FRONTEND_PORT=$RUNFORFAN_FRONTEND_PORT
          EOF
          scp caddy-runforfan.conf "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/caddy-runforfan.conf"
          rm -f caddy-runforfan.conf
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "set -e; \
            if [ -f /etc/caddy/Caddyfile ] && [ ! -f /etc/caddy/Caddyfile.before-runforfan ]; then sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.before-runforfan; fi; \
            sudo install -d -m 755 /etc/systemd/system/caddy.service.d; \
            sudo install -m 644 '$DEPLOY_PATH/caddy-runforfan.conf' /etc/systemd/system/caddy.service.d/runforfan.conf; \
            sudo install -m 644 '$DEPLOY_PATH/Caddyfile' /etc/caddy/Caddyfile; \
            sudo systemctl daemon-reload; \
            sudo env RUNFORFAN_DOMAIN='$RUNFORFAN_DOMAIN' RUNFORFAN_BACKEND_PORT='$RUNFORFAN_BACKEND_PORT' RUNFORFAN_FRONTEND_PORT='$RUNFORFAN_FRONTEND_PORT' caddy validate --config /etc/caddy/Caddyfile; \
            sudo systemctl reload caddy || sudo systemctl restart caddy"

      - name: Pull and restart services
        run: |
          printf '%s' '${{ github.token }}' | ssh "$DEPLOY_USER@$DEPLOY_HOST" "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && docker compose pull && docker compose up -d --remove-orphans && docker image prune -f"

      - name: Configure Telegram delivery
        run: |
          if [ "$RUNFORFAN_TELEGRAM_POLLING_ENABLED" = "true" ]; then
            delivery_response="$(curl -fsS -X POST "https://api.telegram.org/bot${RUNFORFAN_TELEGRAM_BOT_TOKEN}/deleteWebhook" \
              --data-urlencode "drop_pending_updates=false")"
          else
            delivery_response="$(curl -fsS -X POST "https://api.telegram.org/bot${RUNFORFAN_TELEGRAM_BOT_TOKEN}/setWebhook" \
              --data-urlencode "url=https://${RUNFORFAN_DOMAIN}/api/auth/telegram/webhook" \
              --data-urlencode "secret_token=${RUNFORFAN_TELEGRAM_WEBHOOK_SECRET}" \
              --data-urlencode 'allowed_updates=["message"]')"
          fi
          DELIVERY_RESPONSE="$delivery_response" python3 - <<'PY'
          import json
          import os
          import sys

          payload = json.loads(os.environ["DELIVERY_RESPONSE"])
          if not payload.get("ok"):
              print(payload, file=sys.stderr)
              raise SystemExit(1)
          PY

      - name: Verify deployment
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && docker compose ps"
          if [ "${RUNFORFAN_COACH_ENABLED,,}" = "true" ]; then
            ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && docker compose exec -T backend python -c 'from app.core.settings import get_settings; assert get_settings().coach_enabled'"
          else
            ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && docker compose exec -T backend python -c 'from app.core.settings import get_settings; assert not get_settings().coach_enabled'"
          fi
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && docker compose exec -T backend python -c 'from app.core.settings import get_settings; s = get_settings(); assert s.coach_delivery_enabled == (\"$RUNFORFAN_COACH_DELIVERY_ENABLED\".lower() == \"true\"); assert s.coach_delivery_worker_enabled == (\"$RUNFORFAN_COACH_DELIVERY_WORKER_ENABLED\".lower() == \"true\"); assert s.coach_post_workout_delivery_enabled == (\"$RUNFORFAN_COACH_POST_WORKOUT_DELIVERY_ENABLED\".lower() == \"true\"); assert s.coach_weekly_review_delivery_enabled == (\"$RUNFORFAN_COACH_WEEKLY_REVIEW_DELIVERY_ENABLED\".lower() == \"true\")'"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && docker compose exec -T backend python -c 'from app.core.settings import get_settings; assert get_settings().safety_escalation_enabled == (\"$RUNFORFAN_SAFETY_ESCALATION_ENABLED\".lower() == \"true\")'"
          test "$(ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && docker compose exec -T db psql -U runforfan -d runforfan -tAc \"SELECT 1 FROM schema_migrations WHERE version = '20260715_0032_safety_escalations'\"")" = "1"
          curl -fsS --retry 12 --retry-delay 5 "https://$RUNFORFAN_DOMAIN/health"
          test "$(curl -fsS -o /dev/null -w '%{http_code}:%{redirect_url}' "https://$RUNFORFAN_DOMAIN/")" = "302:https://$RUNFORFAN_DOMAIN/app/"
          test "$(curl -fsS -o /dev/null -w '%{http_code}:%{redirect_url}' "https://$RUNFORFAN_DOMAIN/admin/")" = "301:https://$RUNFORFAN_DOMAIN/app/"
          curl -fsSI --retry 12 --retry-delay 5 "https://$RUNFORFAN_DOMAIN/app/"
          curl -fsSI --retry 12 --retry-delay 5 "https://$RUNFORFAN_DOMAIN/app/alpha-tester-guide.html"
          curl -fsSI --retry 12 --retry-delay 5 "https://$RUNFORFAN_DOMAIN/app/manifest.webmanifest"
          curl -fsSI --retry 12 --retry-delay 5 "https://$RUNFORFAN_DOMAIN/app/sw.js"
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          base = f"https://{os.environ['RUNFORFAN_DOMAIN']}"
          with urllib.request.urlopen(f"{base}/app/manifest.webmanifest", timeout=20) as response:
              manifest = json.load(response)
          assert manifest["start_url"] == "/app/"
          assert manifest["scope"] == "/app/"
          assert any(icon.get("purpose") == "maskable" for icon in manifest.get("icons", []))

          with urllib.request.urlopen(f"{base}/app/sw.js", timeout=20) as response:
              sw_head = response.read(512).decode("utf-8", errors="replace")
          assert "runforfan-pwa" in sw_head
          assert "</html" not in sw_head.lower()
          PY
          curl -fsS --retry 6 --retry-delay 5 "https://$RUNFORFAN_DOMAIN/api/auth/telegram/bot-link"
