name: Deploy Runforfan

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/runforfan-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/runforfan-frontend

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=/api
            VITE_ENABLE_DEV_LOGIN=${{ vars.VITE_ENABLE_DEV_LOGIN || 'true' }}
            VITE_TELEGRAM_BOT_USERNAME=${{ vars.VITE_TELEGRAM_BOT_USERNAME || '' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: /opt/runforfan
      RUNFORFAN_DOMAIN: ${{ vars.RUNFORFAN_DOMAIN || 'run.slavx.ru' }}
      RUNFORFAN_APP_ENV: ${{ vars.RUNFORFAN_APP_ENV || 'development' }}
      RUNFORFAN_DEMO_SEED: ${{ vars.RUNFORFAN_DEMO_SEED || 'true' }}
      RUNFORFAN_FRONTEND_PORT: ${{ vars.RUNFORFAN_FRONTEND_PORT || '18080' }}
      RUNFORFAN_BACKEND_PORT: ${{ vars.RUNFORFAN_BACKEND_PORT || '18081' }}
      RUNFORFAN_POSTGRES_PASSWORD: ${{ secrets.RUNFORFAN_POSTGRES_PASSWORD }}
      RUNFORFAN_SECRET_KEY: ${{ secrets.RUNFORFAN_SECRET_KEY }}
      RUNFORFAN_TELEGRAM_BOT_TOKEN: ${{ secrets.RUNFORFAN_TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST" || { echo "DEPLOY_HOST secret is required"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "DEPLOY_USER secret is required"; exit 1; }
          test -n "$RUNFORFAN_POSTGRES_PASSWORD" || { echo "RUNFORFAN_POSTGRES_PASSWORD secret is required"; exit 1; }
          test -n "$RUNFORFAN_SECRET_KEY" || { echo "RUNFORFAN_SECRET_KEY secret is required"; exit 1; }

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose files
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "sudo mkdir -p '$DEPLOY_PATH' && sudo chown '$DEPLOY_USER:$DEPLOY_USER' '$DEPLOY_PATH'"
          scp deploy/docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"
          scp deploy/Caddyfile "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/Caddyfile"

      - name: Write server environment
        run: |
          umask 077
          cat > runforfan.env <<EOF
          RUNFORFAN_DOMAIN=$RUNFORFAN_DOMAIN
          RUNFORFAN_BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:latest
          RUNFORFAN_FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:latest
          RUNFORFAN_BACKEND_PORT=$RUNFORFAN_BACKEND_PORT
          RUNFORFAN_FRONTEND_PORT=$RUNFORFAN_FRONTEND_PORT
          RUNFORFAN_POSTGRES_PASSWORD=$RUNFORFAN_POSTGRES_PASSWORD
          RUNFORFAN_SECRET_KEY=$RUNFORFAN_SECRET_KEY
          RUNFORFAN_TELEGRAM_BOT_TOKEN=$RUNFORFAN_TELEGRAM_BOT_TOKEN
          RUNFORFAN_APP_ENV=$RUNFORFAN_APP_ENV
          RUNFORFAN_DEMO_SEED=$RUNFORFAN_DEMO_SEED
          RUNFORFAN_AUTO_CREATE_SCHEMA=true
          EOF
          scp runforfan.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"
          rm -f runforfan.env

      - name: Install host Caddy config
        run: |
          cat > caddy-runforfan.conf <<EOF
          [Service]
          Environment=RUNFORFAN_DOMAIN=$RUNFORFAN_DOMAIN
          Environment=RUNFORFAN_BACKEND_PORT=$RUNFORFAN_BACKEND_PORT
          Environment=RUNFORFAN_FRONTEND_PORT=$RUNFORFAN_FRONTEND_PORT
          EOF
          scp caddy-runforfan.conf "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/caddy-runforfan.conf"
          rm -f caddy-runforfan.conf
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "set -e; \
            if [ -f /etc/caddy/Caddyfile ] && [ ! -f /etc/caddy/Caddyfile.before-runforfan ]; then sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.before-runforfan; fi; \
            sudo install -d -m 755 /etc/systemd/system/caddy.service.d; \
            sudo install -m 644 '$DEPLOY_PATH/caddy-runforfan.conf' /etc/systemd/system/caddy.service.d/runforfan.conf; \
            sudo install -m 644 '$DEPLOY_PATH/Caddyfile' /etc/caddy/Caddyfile; \
            sudo systemctl daemon-reload; \
            sudo env RUNFORFAN_DOMAIN='$RUNFORFAN_DOMAIN' RUNFORFAN_BACKEND_PORT='$RUNFORFAN_BACKEND_PORT' RUNFORFAN_FRONTEND_PORT='$RUNFORFAN_FRONTEND_PORT' caddy validate --config /etc/caddy/Caddyfile; \
            sudo systemctl reload caddy || sudo systemctl restart caddy"

      - name: Pull and restart services
        run: |
          printf '%s' '${{ github.token }}' | ssh "$DEPLOY_USER@$DEPLOY_HOST" "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && docker compose pull && docker compose up -d --remove-orphans && docker image prune -f"

      - name: Verify deployment
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && docker compose ps"
          curl -fsS --retry 12 --retry-delay 5 "https://$RUNFORFAN_DOMAIN/health"
          test "$(curl -fsS -o /dev/null -w '%{http_code}:%{redirect_url}' "https://$RUNFORFAN_DOMAIN/")" = "302:https://$RUNFORFAN_DOMAIN/app/"
          test "$(curl -fsS -o /dev/null -w '%{http_code}:%{redirect_url}' "https://$RUNFORFAN_DOMAIN/admin/")" = "301:https://$RUNFORFAN_DOMAIN/app/"
          curl -fsSI --retry 12 --retry-delay 5 "https://$RUNFORFAN_DOMAIN/app/"
