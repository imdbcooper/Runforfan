services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: runforfan
      POSTGRES_USER: runforfan
      POSTGRES_PASSWORD: runforfan
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runforfan -d runforfan"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - runforfan_net

  backend:
    build:
      context: ./backend
    environment:
      RUNFORFAN_DATABASE_URL: postgresql+psycopg://runforfan:runforfan@db:5432/runforfan
      RUNFORFAN_APP_ENV: development
      RUNFORFAN_AUTO_CREATE_SCHEMA: "true"
      RUNFORFAN_DEMO_SEED: "true"
      RUNFORFAN_UPLOAD_DIR: /app/storage/uploads
      RUNFORFAN_COACH_ENABLED: "true"
      RUNFORFAN_COACH_DELIVERY_ENABLED: "false"
      RUNFORFAN_COACH_DELIVERY_WORKER_ENABLED: "false"
      RUNFORFAN_COACH_POST_WORKOUT_DELIVERY_ENABLED: "false"
      RUNFORFAN_COACH_WEEKLY_REVIEW_DELIVERY_ENABLED: "false"
      RUNFORFAN_SAFETY_ESCALATION_ENABLED: "false"
      RUNFORFAN_SAFETY_REVIEW_ENABLED: "false"
      RUNFORFAN_SAFETY_REVIEW_REVIEWER_API_ENABLED: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./backend/app/storage/uploads:/app/storage/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - runforfan_net

  coach-delivery-worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: python -m app.workers.coach_delivery
    environment:
      RUNFORFAN_DATABASE_URL: postgresql+psycopg://runforfan:runforfan@db:5432/runforfan
      RUNFORFAN_APP_ENV: development
      RUNFORFAN_TELEGRAM_BOT_TOKEN: ${RUNFORFAN_TELEGRAM_BOT_TOKEN:-}
      RUNFORFAN_FRONTEND_URL: ${RUNFORFAN_FRONTEND_URL:-http://127.0.0.1:5173/app/}
      RUNFORFAN_COACH_DELIVERY_ENABLED: "false"
      RUNFORFAN_COACH_DELIVERY_WORKER_ENABLED: "false"
      RUNFORFAN_COACH_POST_WORKOUT_DELIVERY_ENABLED: "false"
      RUNFORFAN_COACH_WEEKLY_REVIEW_DELIVERY_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - runforfan_net

volumes:
  postgres_data:

networks:
  runforfan_net:
    ipam:
      config:
        - subnet: 172.24.50.0/24
