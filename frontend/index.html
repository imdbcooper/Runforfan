<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fff7ed" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Runforfan" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      const assetBase = "%BASE_URL%"
      const manifest = document.createElement("link")
      manifest.rel = "manifest"
      manifest.href = `${assetBase}manifest.webmanifest`
      document.head.appendChild(manifest)
      const icon = document.createElement("link")
      icon.rel = "icon"
      icon.type = "image/svg+xml"
      icon.href = `${assetBase}icons/runforfan-icon.svg`
      document.head.appendChild(icon)
      const appleIcon = document.createElement("link")
      appleIcon.rel = "apple-touch-icon"
      appleIcon.href = `${assetBase}icons/runforfan-apple-touch-icon.png`
      document.head.appendChild(appleIcon)
    </script>
    <title>Runforfan</title>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("runforfan_theme")
          const theme = stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"
          document.documentElement.classList.add(theme)
          document.documentElement.style.colorScheme = theme
        } catch {
          document.documentElement.classList.add("dark")
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
