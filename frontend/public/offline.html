<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <title>Runforfan offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #09090b;
        color: #fafafa;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background:
          radial-gradient(circle at 20% 10%, rgba(249, 115, 22, 0.2), transparent 26rem),
          linear-gradient(135deg, #09090b 0%, #18181b 100%);
      }

      main {
        width: min(100%, 28rem);
        border: 1px solid rgba(249, 115, 22, 0.28);
        border-radius: 1.5rem;
        padding: 1.5rem;
        background: rgba(24, 24, 27, 0.86);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }

      .mark {
        display: inline-grid;
        place-items: center;
        width: 3rem;
        height: 3rem;
        margin-bottom: 1rem;
        border-radius: 1rem;
        background: #f97316;
        color: #09090b;
        font-weight: 900;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.7rem, 8vw, 2.7rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      p {
        margin: 0 0 1rem;
        color: #d4d4d8;
        line-height: 1.6;
      }

      a {
        color: #fed7aa;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="mark" aria-hidden="true">R</span>
      <h1>Нужен интернет</h1>
      <p>Runforfan установлен как PWA, но профиль, планы, импорт, Telegram-вход и расчеты работают через backend.</p>
      <p>Проверьте соединение и откройте <a href="/app/">Runforfan</a> снова.</p>
    </main>
  </body>
</html>
